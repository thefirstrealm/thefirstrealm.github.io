<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lore Team — Editor</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div id="login-screen">
  <h1>✦ Lore Team Editor</h1>
  <input type="password" id="pw-input" placeholder="Editor password" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="password" id="pat-input" placeholder="GitHub PAT (github_pat_...)" onkeydown="if(event.key==='Enter')doLogin()">
  <p class="help-text">Token is stored only in this browser.</p>
  <button onclick="doLogin()">Enter</button>
  <span id="login-err"></span>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>✦ Lore Editor</h1>
    <button onclick="addColumn()">+ Category</button>
    <span id="save-status"></span>
    <button id="save-btn" onclick="saveBoard()">Save</button>
  </header>

  <div id="board"></div>
</div>

<!-- CARD MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <button onclick="closeEditModal()">×</button>
    <h2 id="edit-title"></h2>

    <div class="field"><label>Roleplay Name</label><input id="f-rpname"></div>
    <div class="field"><label>Username</label><input id="f-username"></div>
    <div class="field"><label>Title(s)</label><input id="f-titles" placeholder="comma separated"></div>
    <div class="field"><label>Faction(s)</label><input id="f-factions" placeholder="comma separated"></div>
    <div class="field"><label>Religion</label><input id="f-religion"></div>
    <div class="field"><label>Character Age</label><input id="f-age" type="number"></div>
    <div class="field"><label>Attributes</label><input id="f-attributes" placeholder="comma separated"></div>

    <div class="modal-footer">
      <button onclick="closeEditModal()">Cancel</button>
      <button onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'thefirstrealm';
const REPO = 'thefirstrealm.github.io';
const FILE = 'board.json';
const BRANCH = 'main';

const EDITOR_PASSWORD = 'lore-team-2025';

let GH_TOKEN = '';
let boardData = null;
let editing = null;
let fileSha = null;

window.onload = () => {
  const t = localStorage.getItem('lore_gh_token');
  if (t) document.getElementById('pat-input').value = t;
};

// ───────── LOGIN ─────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const pat = document.getElementById('pat-input').value.trim();

  if (pw !== EDITOR_PASSWORD) {
    return document.getElementById('login-err').textContent = 'Wrong password';
  }

  GH_TOKEN = pat;
  localStorage.setItem('lore_gh_token', pat);

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  loadBoard();
}

// ───────── GITHUB ─────────
async function ghGet() {
  const r = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}?ref=${BRANCH}`,
    { headers: { Authorization: `Bearer ${GH_TOKEN}` } }
  );
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadBoard() {
  setStatus("Loading...");
  const res = await ghGet();
  fileSha = res.sha;
  boardData = JSON.parse(atob(res.content.replace(/\n/g,'')));
  render();
  setStatus("Loaded ✓");
}

async function saveBoard() {
  setStatus("Saving...");
  document.getElementById('save-btn').disabled = true;

  try {
    const latest = await ghGet();
    fileSha = latest.sha;

    const content = btoa(unescape(encodeURIComponent(
      JSON.stringify(boardData, null, 2)
    )));

    const r = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${GH_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'update board',
          content,
          sha: fileSha,
          branch: BRANCH
        })
      }
    );

    if (!r.ok) throw new Error(await r.text());

    setStatus("Saved ✓");
  } catch (e) {
    setStatus("Save failed: " + e.message);
  }

  document.getElementById('save-btn').disabled = false;
}

function setStatus(t) {
  document.getElementById('save-status').textContent = t;
}

// ───────── BOARD RENDER ─────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  boardData.columns.forEach((col, ci) => {
    const el = document.createElement('div');
    el.className = 'column';

    el.innerHTML = `
      <div class="col-header">
        <span>${col.title}</span>
        <button onclick="renameColumn(${ci})">✎</button>
        <button onclick="deleteColumn(${ci})">🗑</button>
        <button onclick="openNew(${ci})">+</button>
      </div>
      <div class="cards"></div>
    `;

    const cardsEl = el.querySelector('.cards');

    col.cards.forEach((c, ki) => {
      cardsEl.appendChild(card(c, ci, ki));
    });

    board.appendChild(el);
  });
}

function card(c, ci, ki) {
  const el = document.createElement('div');
  el.className = 'card';

  el.innerHTML = `
    <strong>${c.roleplayName}</strong>
    <div>${c.username}</div>
    <div>${c.titles?.join(', ') || ''}</div>
    <div>${c.factions?.join(', ') || ''}</div>
    <div>${c.religion || ''}</div>
    <div>Age: ${c.characterAge || ''}</div>
    <div>${c.attributes?.join(', ') || ''}</div>

    <button onclick="edit(${ci},${ki})">Edit</button>
  `;

  return el;
}

// ───────── COLUMNS ─────────
function addColumn() {
  const title = prompt("Category name:");
  if (!title) return;

  boardData.columns.push({
    id: title.toLowerCase().replace(/\s+/g,'-'),
    title,
    cards: []
  });

  render();
}

function renameColumn(ci) {
  const col = boardData.columns[ci];
  const t = prompt("Rename:", col.title);
  if (!t) return;
  col.title = t;
  render();
}

function deleteColumn(ci) {
  if (!confirm("Delete column?")) return;
  boardData.columns.splice(ci,1);
  render();
}

// ───────── CARDS ─────────
function openNew(ci) {
  editing = { ci, ki: null };
  openModal("New Card", {});
}

function edit(ci, ki) {
  editing = { ci, ki };
  openModal("Edit Card", boardData.columns[ci].cards[ki]);
}

function openModal(title, c) {
  document.getElementById('edit-title').textContent = title;

  f('f-rpname', c.roleplayName);
  f('f-username', c.username);
  f('f-titles', (c.titles||[]).join(', '));
  f('f-factions', (c.factions||[]).join(', '));
  f('f-religion', c.religion);
  f('f-age', c.characterAge);
  f('f-attributes', (c.attributes||[]).join(', '));

  document.getElementById('edit-modal').classList.add('open');
}

function f(id, v) {
  document.getElementById(id).value = v || '';
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function saveCard() {
  const { ci, ki } = editing;

  const card = {
    id: ki !== null ? boardData.columns[ci].cards[ki].id : 'card-' + Date.now(),

    roleplayName: v('f-rpname'),
    username: v('f-username'),
    titles: split('f-titles'),
    factions: split('f-factions'),
    religion: v('f-religion'),
    characterAge: Number(v('f-age') || 0),
    attributes: split('f-attributes'),
    created: new Date().toISOString().slice(0,10)
  };

  if (ki !== null) boardData.columns[ci].cards[ki] = card;
  else boardData.columns[ci].cards.push(card);

  closeEditModal();
  render();
}

function v(id) {
  return document.getElementById(id).value.trim();
}

function split(id) {
  return v(id).split(',').map(x=>x.trim()).filter(Boolean);
}
</script>

</body>
</html>
