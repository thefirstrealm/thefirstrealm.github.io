<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lore Team — Editor</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div id="login-screen">
  <h1>✦ Lore Team Editor</h1>
  <input type="password" id="pw-input" placeholder="Editor password" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="password" id="pat-input" placeholder="GitHub PAT (github_pat_...)" onkeydown="if(event.key==='Enter')doLogin()">
  <p class="help-text" style="color: var(--muted); font-size: 0.8rem;">Token is stored only in this browser.</p>
  <button class="btn-primary" onclick="doLogin()">Enter</button>
  <span id="login-err" style="color: var(--danger); font-size: 0.9rem;"></span>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>✦ Lore Editor</h1>
    <button class="btn-primary" onclick="addColumn()">+ Category</button>
    <span id="save-status"></span>
    <button id="save-btn" onclick="saveBoard()">Save to GitHub</button>
  </header>

  <div id="board"></div>
</div>

<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeEditModal()">×</button>
    <h2 id="edit-title"></h2>

    <div class="field"><label>Roleplay Name</label><input id="f-rpname"></div>
    <div class="field"><label>Username</label><input id="f-username"></div>
    <div class="field"><label>Title(s)</label><input id="f-titles" placeholder="comma separated"></div>
    <div class="field"><label>Faction(s)</label><input id="f-factions" placeholder="comma separated"></div>
    <div class="field"><label>Religion</label><input id="f-religion"></div>
    <div class="field"><label>Character Age</label><input id="f-age" type="number"></div>
    <div class="field"><label>Attributes</label><input id="f-attributes" placeholder="comma separated"></div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-primary" onclick="saveCard()">Update Card</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'thefirstrealm';
const REPO = 'thefirstrealm.github.io';
const FILE = 'board.json';
const BRANCH = 'main';
const EDITOR_PASSWORD = 'lore-team-2025';

let GH_TOKEN = '';
let boardData = null;
let editing = null;

window.onload = () => {
  const t = localStorage.getItem('lore_gh_token');
  if (t) document.getElementById('pat-input').value = t;
};

// ───────── AUTH ─────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const pat = document.getElementById('pat-input').value.trim();

  if (pw !== EDITOR_PASSWORD) {
    return document.getElementById('login-err').textContent = 'Wrong password';
  }

  GH_TOKEN = pat;
  localStorage.setItem('lore_gh_token', pat);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadBoard();
}

// ───────── GITHUB API ─────────
async function ghGet() {
  const r = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}?ref=${BRANCH}&t=${Date.now()}`,
    { 
      headers: { 
        Authorization: `Bearer ${GH_TOKEN}`,
        'Cache-Control': 'no-cache',
        'Accept': 'application/vnd.github.v3+json'
      } 
    }
  );
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadBoard() {
  setStatus("Loading...");
  try {
    const res = await ghGet();
    boardData = JSON.parse(decodeURIComponent(escape(atob(res.content.replace(/\s/g, '')))));
    render();
    setStatus("Loaded ✓");
  } catch (e) {
    console.error(e);
    setStatus("Load failed: Check Token/Permissions");
  }
}

async function saveBoard() {
  setStatus("Saving...");
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;

  try {
    const latest = await ghGet();
    const jsonString = JSON.stringify(boardData, null, 2);
    const content = btoa(unescape(encodeURIComponent(jsonString)));

    const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { 
        Authorization: `Bearer ${GH_TOKEN}`,
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        message: 'Lore update: Character board modified',
        content,
        sha: latest.sha,
        branch: BRANCH
      })
    });

    if (!r.ok) throw new Error("GitHub Error");
    setStatus("Saved ✓");
  } catch (e) {
    setStatus("Save failed");
    console.error(e);
  }
  saveBtn.disabled = false;
}

// ───────── UI RENDER ─────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (!boardData?.columns) return;

  boardData.columns.forEach((col, ci) => {
    const el = document.createElement('div');
    el.className = 'column';
    el.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.title}</span>
        <div style="display:flex; gap:5px;">
          <button onclick="renameColumn(${ci})">✎</button>
          <button onclick="deleteColumn(${ci})">🗑</button>
          <button onclick="openNew(${ci})">+</button>
        </div>
      </div>
      <div class="cards"></div>
    `;
    const cardsEl = el.querySelector('.cards');
    col.cards.forEach((c, ki) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:start;">
          <strong class="card-name">${c.roleplayName || 'Unnamed'}</strong>
          <button onclick="deleteCard(${ci},${ki})" style="background:none; color:var(--danger); border:none; padding:0 5px;">×</button>
        </div>
        <div class="card-owner">${c.username || ''}</div>
        <button class="btn-primary" style="font-size:0.7rem; padding:4px 8px; margin-top:8px;" onclick="edit(${ci},${ki})">Edit Profile</button>
      `;
      cardsEl.appendChild(cardEl);
    });
    board.appendChild(el);
  });
}

function setStatus(t) { document.getElementById('save-status').textContent = t; }

// ───────── CRUD LOGIC ─────────
function openNew(ci) { editing = { ci, ki: null }; openModal("New Character", {}); }
function edit(ci, ki) { editing = { ci, ki }; openModal("Edit Character", boardData.columns[ci].cards[ki]); }

function openModal(title, c) {
  document.getElementById('edit-title').textContent = title;
  const fields = ['rpname', 'username', 'titles', 'factions', 'religion', 'age', 'attributes'];
  fields.forEach(f => {
    const val = c[f === 'rpname' ? 'roleplayName' : (f === 'age' ? 'characterAge' : f)];
    document.getElementById('f-' + f).value = Array.isArray(val) ? val.join(', ') : (val || '');
  });
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

function saveCard() {
  const { ci, ki } = editing;
  const getV = (id) => document.getElementById('f-' + id).value.trim();
  const getS = (id) => getV(id).split(',').map(x => x.trim()).filter(Boolean);

  const card = {
    id: ki !== null ? boardData.columns[ci].cards[ki].id : 'card-' + Date.now(),
    roleplayName: getV('rpname'),
    username: getV('username'),
    titles: getS('titles'),
    factions: getS('factions'),
    religion: getV('religion'),
    characterAge: Number(getV('age') || 0),
    attributes: getS('attributes'),
    created: ki !== null ? boardData.columns[ci].cards[ki].created : new Date().toISOString().split('T')[0]
  };

  if (ki !== null) boardData.columns[ci].cards[ki] = card;
  else boardData.columns[ci].cards.push(card);

  closeEditModal();
  render();
}

function deleteCard(ci, ki) {
  if (confirm("Delete this character?")) {
    boardData.columns[ci].cards.splice(ki, 1);
    render();
  }
}

function addColumn() {
  const title = prompt("Category name:");
  if (title) {
    boardData.columns.push({ id: title.toLowerCase().replace(/\s+/g,'-'), title, cards: [] });
    render();
  }
}

function renameColumn(ci) {
  const t = prompt("New name:", boardData.columns[ci].title);
  if (t) { boardData.columns[ci].title = t; render(); }
}

function deleteColumn(ci) {
  if (confirm("Delete category and all characters?")) {
    boardData.columns.splice(ci, 1);
    render();
  }
}
</script>

</body>
</html>
