<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lore Team — Character Board</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<header>
  <div>
    <h1>✦ Lore Team — Character Board</h1>
    <p id="status">Loading…</p>
  </div>
  <button onclick="loadBoard()">↻ Refresh</button>
</header>

<div id="board"></div>

<!-- ───────── MODAL ───────── -->
<div id="modal-backdrop" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">×</button>

    <img id="m-img" class="m-img" style="display:none">

    <h2 id="m-rpname"></h2>
    <div id="m-username" class="m-owner"></div>

    <div class="m-section">
      <strong>Titles:</strong>
      <span id="m-titles"></span>
    </div>

    <div class="m-section">
      <strong>Factions:</strong>
      <span id="m-factions"></span>
    </div>

    <div class="m-section">
      <strong>Religion:</strong>
      <span id="m-religion"></span>
    </div>

    <div class="m-section">
      <strong>Age:</strong>
      <span id="m-age"></span>
    </div>

    <p id="m-attributes" class="tags"></p>
  </div>
</div>

<script>
const OWNER  = 'thefirstrealm';
const REPO   = 'thefirstrealm.github.io';
const FILE   = 'board.json';
const BRANCH = 'main';

const COL_COLORS = {
  submitted: 'var(--col-submitted)',
  'in-review': 'var(--col-review)',
  approved: 'var(--col-approved)',
  published: 'var(--col-published)'
};

// ───────── LOAD ─────────
async function loadBoard() {
  const status = document.getElementById('status');
  status.textContent = 'Loading…';

  try {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FILE}?t=${Date.now()}`;
    const res = await fetch(url);

    if (!res.ok) throw new Error(res.statusText);

    const data = await res.json();
    render(data);

    status.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    status.textContent = 'Load failed';
    console.error(e);
  }
}

// ───────── RENDER ─────────
function render(data) {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (const col of data.columns || []) {
    const colEl = document.createElement('div');
    colEl.className = 'column';

    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.title}</span>
        <span class="col-count">${col.cards.length}</span>
      </div>
      <div class="cards"></div>
    `;

    const cardsEl = colEl.querySelector('.cards');

    for (const c of col.cards) {
      const card = normalizeCard(c);

      const el = document.createElement('div');
      el.className = 'card';

      el.onclick = () => openModal(card);

      el.innerHTML = `
        <div class="card-name">${card.roleplayName}</div>
        <div class="card-owner">${card.username}</div>
        <div class="card-desc">
          ${card.factions?.join(', ') || ''}
        </div>
      `;

      cardsEl.appendChild(el);
    }

    board.appendChild(colEl);
  }
}

// ───────── NORMALISE OLD + NEW DATA ─────────
function normalizeCard(c) {
  return {
    roleplayName: c.roleplayName || c.name || 'Unnamed',
    username: c.username || c.owner || '',
    titles: c.titles || [],
    factions: c.factions || [],
    religion: c.religion || '',
    characterAge: c.characterAge || 0,
    attributes: c.attributes || c.tags || [],
    image: c.image || ''
  };
}

// ───────── MODAL ─────────
function openModal(card) {
  const c = normalizeCard(card);

  document.getElementById('m-rpname').textContent = c.roleplayName;
  document.getElementById('m-username').textContent = c.username;

  document.getElementById('m-titles').textContent = c.titles.join(', ');
  document.getElementById('m-factions').textContent = c.factions.join(', ');
  document.getElementById('m-religion').textContent = c.religion;
  document.getElementById('m-age').textContent = c.characterAge;

  document.getElementById('m-attributes').innerHTML =
    (c.attributes || []).map(t => `<span class="tag">${t}</span>`).join('');

  const img = document.getElementById('m-img');

  if (c.image) {
    img.src = c.image;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }

  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target.id === 'modal-backdrop' || e.target.id === 'modal-close') {
    document.getElementById('modal-backdrop').classList.remove('open');
  }
}

// ───────── INIT ─────────
loadBoard();
setInterval(loadBoard, 5 * 60 * 1000);
</script>

</body>
</html>
